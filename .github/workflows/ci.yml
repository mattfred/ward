name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Prepare test database
        run: |
          echo 'DATABASE_URL="file:./prisma/ci.db"' >> $GITHUB_ENV
          echo 'DATABASE_URL="file:./prisma/ci.db"' > .env
          echo 'AUTH_SECRET="ci-secret-ci-secret-ci-secret-123456"' >> .env
          echo 'NEXTAUTH_URL="http://localhost:3000"' >> .env
          echo 'AUTH_TRUST_HOST=true' >> .env
          echo 'ALLOW_DEV_PREMIUM_BYPASS=true' >> .env
          npx prisma migrate deploy
      - run: npm run test
      - run: npm run lint
      - run: npm run build
