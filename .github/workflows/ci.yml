name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cohesive
          POSTGRES_PASSWORD: cohesive
          POSTGRES_DB: cohesive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cohesive -d cohesive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cohesive:cohesive@localhost:5432/cohesive?schema=public
      DIRECT_URL: postgresql://cohesive:cohesive@localhost:5432/cohesive?schema=public
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-123456
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      ALLOW_DEV_PREMIUM_BYPASS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test
      - run: npm run lint
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cohesive
          POSTGRES_PASSWORD: cohesive
          POSTGRES_DB: cohesive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cohesive -d cohesive"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cohesive:cohesive@localhost:5432/cohesive?schema=public
      DIRECT_URL: postgresql://cohesive:cohesive@localhost:5432/cohesive?schema=public
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-123456
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      ALLOW_DEV_PREMIUM_BYPASS: "true"
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
